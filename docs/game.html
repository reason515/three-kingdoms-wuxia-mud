<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>汉末江湖录 · 长安残照</title>
<style>
/* ═══════════════ TOKENS ═══════════════ */
:root {
  --ink:#1c1a17; --ink-soft:#3a352e; --ink-fade:#72695c;
  --paper:#ece3d2; --paper-2:#e2d6bd; --paper-card:#f3ecdc; --paper-light:#f8f2e5;
  --seal:#9e2b25; --seal-deep:#7c211c;
  --gold:#a8842f; --gold-bright:#cba65b;
  --jade:#4a6c5d; --line:#c4b594; --night:#171817;
  --font-serif:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
  --font-mono:"Cascadia Code","Consolas",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;overflow-x:hidden}
button{font:inherit}
body{
  font-family:var(--font-serif);color:var(--ink);
  background:linear-gradient(145deg,#111311 0%,#26241f 52%,#151615 100%);
}
body::before{
  content:"";position:fixed;inset:0;opacity:.12;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.24'/%3E%3C/svg%3E");
}
#app{max-width:430px;margin:0 auto;min-height:100dvh;position:relative}

/* ═══ DEVICE FRAME (desktop) ═══ */
@media(min-width:520px){
  #app{
    margin:24px auto 48px;
    border:1px solid rgba(203,166,91,.55);border-radius:18px;overflow:hidden;
    box-shadow:0 38px 80px rgba(0,0,0,.48),0 0 0 6px #0e0f0e,0 0 0 7px rgba(203,166,91,.24);
    min-height:860px;max-height:96vh;display:flex;flex-direction:column;
  }
}

/* ═══ SCREENS ═══ */
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex;min-height:100dvh}
#screen-game.active,#screen-mud.active{height:100dvh;overflow:hidden}
@media(min-width:520px){.screen.active{min-height:0}#screen-game.active,#screen-mud.active{height:auto}}

/* ═══ TITLE SCREEN ═══ */
#screen-title{background:var(--paper);justify-content:center;align-items:center;padding:var(--space-6,32px);gap:32px;text-align:center}
#screen-title h1{font-size:36px;letter-spacing:10px;font-weight:700}
#screen-title .sub{color:var(--ink-soft);letter-spacing:6px;font-size:14px;margin:8px 0 24px}
#screen-title .seal-stamp{display:inline-block;border:2px solid var(--seal);color:var(--seal);padding:6px 20px;font-size:12px;letter-spacing:4px;transform:rotate(-3deg)}

/* ═══ APP HEADER ═══ */
.app-head{
  flex:0 0 auto;color:#eadfc8;
  background:linear-gradient(90deg,rgba(168,132,47,.12),transparent 40%),var(--ink);
  border-bottom:1px solid var(--gold);padding:14px 18px 12px;position:relative;
}
.app-head::after{content:"";position:absolute;height:1px;left:18px;right:18px;bottom:3px;background:linear-gradient(90deg,transparent,rgba(203,166,91,.45),transparent)}
.head-row{display:flex;align-items:center;justify-content:space-between}
.chapter small{display:block;color:#9f9584;font-size:10px;letter-spacing:3px}
.chapter strong{display:block;font-size:15px;letter-spacing:3px;margin-top:2px;font-weight:600}
.time-mark{display:flex;align-items:center;gap:8px;color:#cfc2aa;font-size:11px}
.time-mark::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--seal);box-shadow:0 0 0 3px rgba(158,43,37,.2)}
.progress-bar{display:flex;gap:5px;margin-top:10px}
.progress-bar i{height:2px;flex:1;background:#4b4840}
.progress-bar i.done{background:var(--gold-bright)}
.progress-bar i.current{background:var(--seal)}

/* ═══ SCENE SCROLL ═══ */
.scene-scroll{
  flex:1 1 auto;min-height:0;overflow-y:auto;background:linear-gradient(rgba(236,227,210,.93),rgba(236,227,210,.95)),url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.04' numOctaves='5'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23p)' opacity='.28'/%3E%3C/svg%3E");
  scrollbar-width:thin;scrollbar-color:var(--line) transparent;
}

/* location strip */
.location-strip{
  height:100px;position:relative;overflow:hidden;border-bottom:1px solid var(--line);
  background:linear-gradient(140deg,#d8cdb7,#ede4d3 60%,#d2c4aa);
}
.location-strip svg{width:100%;height:100%;display:block}
.loc-label{position:absolute;left:16px;bottom:12px}
.loc-label span{display:block;color:var(--seal-deep);font-size:10px;letter-spacing:4px}
.loc-label strong{display:block;font-size:19px;letter-spacing:5px;margin-top:1px}
.scene-no{position:absolute;right:15px;top:12px;writing-mode:vertical-rl;color:rgba(28,26,23,.48);font-size:10px;letter-spacing:3px}

/* status bar */
.status-line{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--line);background:rgba(243,236,220,.78)}
.stat{appearance:none;background:transparent;color:inherit;font-family:inherit;text-align:center;padding:8px 4px 7px;border:0;border-right:1px solid rgba(196,181,148,.65);cursor:pointer}
.stat:last-child{border-right:0}
.stat span{display:block;font-size:9px;color:var(--ink-fade);letter-spacing:2px}
.stat b{display:block;margin-top:1px;font:11px/1.3 var(--font-mono);font-weight:600}
.stat b.danger{color:var(--seal)}
.stat b.good{color:var(--jade)}
.stat b.warn{color:#c47a20}

/* mission, story and chronological timeline */
.mission-card{position:relative;display:flex;gap:12px;margin:13px 16px 0;padding:12px 13px;background:linear-gradient(105deg,rgba(158,43,37,.08),rgba(248,242,229,.68));border:1px solid rgba(158,43,37,.28);border-left:3px solid var(--seal)}.mission-seal{flex:0 0 auto;width:30px;height:30px;display:grid;place-items:center;border:1px solid var(--seal);color:var(--seal);font-size:13px;transform:rotate(-2deg)}.mission-card small{display:block;color:var(--seal-deep);font-size:9px;letter-spacing:2px}.mission-card strong{display:block;margin-top:2px;font-size:13px;letter-spacing:.5px}.mission-card p{margin:4px 0 0;color:var(--ink-fade);font-size:10px;line-height:1.5}
.story{padding:16px 18px 8px}
.timeline-area{padding:0 18px 12px}.timeline-area:empty{display:none}.timeline-entry{position:relative;margin:8px 0 0;padding:11px 12px 10px 14px;border-left:3px solid var(--jade);background:rgba(74,108,93,.07);animation:timelineIn .28s ease}.timeline-entry.latest{box-shadow:inset 0 0 0 1px rgba(168,132,47,.25);background:rgba(168,132,47,.08)}.timeline-entry .timeline-label{color:var(--jade);font-size:9px;letter-spacing:2px;margin-bottom:6px}.timeline-entry p{margin:0 0 7px;font-size:12px;line-height:1.75}.timeline-deltas{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}.timeline-continue{width:100%;margin-top:9px}.timeline-entry.system{border-left-color:var(--gold)}@keyframes timelineIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.scene-kicker{display:flex;align-items:center;gap:10px;color:var(--seal-deep);font-size:11px;letter-spacing:3px;margin-bottom:10px}
.scene-kicker::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--line),transparent)}
.story p{margin:0 0 12px;font-size:14.5px;line-height:1.9;color:#27231f}
.story p.opening::first-letter{float:left;color:var(--seal-deep);font-size:38px;line-height:.92;padding:5px 6px 0 0;font-weight:700}
.reveal-unit{opacity:0;filter:blur(1.5px);transition:opacity .42s ease,filter .42s ease}
.reveal-unit.is-shown{opacity:1;filter:none}
.reveal-complete .reveal-unit{transition:none}
.entity{font-weight:650;padding:0 .04em;text-decoration-thickness:1px;text-underline-offset:3px}
.entity-person{color:#8b3029;text-decoration:underline dotted rgba(139,48,41,.42)}
.entity-item{color:#8a681e;text-decoration:underline dotted rgba(138,104,30,.45)}
.entity-place{color:#355f61;text-decoration:underline dotted rgba(53,95,97,.4)}
.entity-technique{color:#3f6756;text-decoration:underline dotted rgba(63,103,86,.42)}
.entity-history{color:#5b506d}
.intro-overlay .entity-person{color:#e58b7e}.intro-overlay .entity-item{color:#d8b667}.intro-overlay .entity-place{color:#80aaa4}.intro-overlay .entity-technique{color:#85b69c}.intro-overlay .entity-history{color:#aaa0c1}
.speech{margin:15px 0 13px;padding:11px 13px 11px 15px;border-left:3px solid var(--jade);background:rgba(74,108,93,.075);color:#2f453c;font-size:13px;line-height:1.75}
.speech small{display:block;color:var(--ink-fade);margin-bottom:2px;letter-spacing:2px}

/* insight panel */
.insight{
  margin:2px 18px 16px;padding:11px 13px;border:1px solid rgba(168,132,47,.55);
  background:linear-gradient(100deg,rgba(168,132,47,.12),rgba(243,236,220,.65));
  display:flex;align-items:center;gap:11px;
}
.insight::before{content:"悟";width:34px;height:34px;display:grid;place-items:center;flex:0 0 auto;color:var(--paper-light);background:var(--jade);border-radius:50%;box-shadow:0 2px 8px rgba(28,26,23,.18);font-size:14px}
.insight-text strong{display:block;font-size:12px;letter-spacing:2px}
.insight-text span{display:block;font-size:10px;color:var(--ink-fade);margin-top:2px}

/* choice consequence interlude */
.result-overlay{position:absolute;inset:0;z-index:30;display:grid;align-items:end;background:rgba(19,20,18,.58);backdrop-filter:blur(2px);animation:fadeIn .18s ease}
.result-sheet{position:relative;z-index:1;max-height:88dvh;overflow-y:auto;padding:24px 22px calc(22px + env(safe-area-inset-bottom,0));background:linear-gradient(165deg,var(--paper-light),var(--paper));border-top:2px solid var(--gold);box-shadow:0 -24px 60px rgba(0,0,0,.28);isolation:isolate}
#app.result-open .decision-panel{visibility:hidden}
.result-sheet::before{content:"果";position:absolute;right:20px;top:18px;width:34px;height:34px;display:grid;place-items:center;border:1px solid var(--seal);color:var(--seal);font-size:15px;transform:rotate(3deg)}
.result-kicker{color:var(--seal-deep);font-size:10px;letter-spacing:4px;margin-bottom:12px}
.result-body{padding-right:44px;font-size:14px;line-height:1.95;color:var(--ink-soft)}
.result-body p{margin:0 0 10px}.result-body p:last-child{margin-bottom:0}
.result-state{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.result-state:empty{display:none}.state-chip{padding:3px 8px;border-radius:2px;background:rgba(158,43,37,.08);color:var(--seal-deep);font:10px/1.5 var(--font-mono);border:1px solid rgba(158,43,37,.2)}
.result-continue{width:100%;margin-top:18px}

/* ═══ DECISION PANEL ═══ */
.decision-panel{
  flex:0 0 auto;max-height:52dvh;overflow-y:auto;padding:10px 12px 6px;
  background:linear-gradient(180deg,rgba(243,236,220,.96),var(--paper-card));
  border-top:1px solid var(--gold);box-shadow:0 -10px 25px rgba(28,26,23,.09);z-index:5;
}
.decision-head{display:flex;justify-content:space-between;align-items:center;min-height:24px;padding:0 3px 7px}
.decision-head span{color:var(--ink-fade);font-size:10px;letter-spacing:3px}
.decision-tools{display:flex;align-items:center;gap:9px}.decision-tool,.reveal-skip{border:0;background:transparent;color:var(--seal-deep);font:10px/1.4 var(--font-serif);letter-spacing:1px;cursor:pointer;padding:3px 0}.reveal-skip{display:none}.decision-panel.is-revealing .reveal-skip{display:block}.decision-panel.is-revealing .decision-tool,.decision-panel.is-revealing .unified-action-group,.decision-panel.is-revealing .inline-command,.decision-panel.is-revealing .story-action-title,.decision-panel.is-revealing .actions,.decision-panel.has-result .unified-action-group,.decision-panel.has-result .inline-command,.decision-panel.has-result .story-action-title,.decision-panel.has-result .actions,.decision-panel.inline-combat .story-action-title,.decision-panel.inline-combat .actions{display:none}
.action-group-title{margin:2px 3px 6px;color:var(--ink-fade);font-size:9px;letter-spacing:2px}.unified-action-group{margin-top:8px;padding-top:7px;border-top:1px dashed var(--line)}.world-actions{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:7px}.world-action{min-height:44px;border:1px solid rgba(74,108,93,.38);border-bottom:2px solid var(--jade);border-radius:3px;background:rgba(74,108,93,.055);color:var(--ink);font-size:10px;cursor:pointer}.world-action.danger{border-bottom-color:var(--seal)}.world-action.tech{color:var(--jade)}
.inline-command{margin:0 2px 7px;border-top:1px dashed var(--line);border-bottom:1px dashed var(--line)}.inline-command summary{padding:6px 1px;color:var(--ink-fade);font-size:9px;cursor:pointer}.inline-command form{display:flex;gap:5px;padding:0 0 7px}.inline-command input{min-width:0;flex:1;padding:7px 8px;border:1px solid var(--line);background:#fffaf0;font:10px var(--font-mono)}.inline-command button{border:0;background:var(--ink);color:var(--gold-bright);padding:0 11px;font-size:10px}
.actions{display:grid;gap:6px;padding-bottom:env(safe-area-inset-bottom,0)}
.action{
  width:100%;border:1px solid var(--line);border-left:3px solid var(--gold);
  border-radius:4px;background:rgba(248,242,229,.86);color:var(--ink);
  padding:9px 10px;text-align:left;display:grid;
  grid-template-columns:1fr auto;gap:2px 10px;cursor:pointer;
  transition:transform .14s ease,box-shadow .14s ease,background .14s ease;
}
.action:active{transform:translateY(-1px);box-shadow:0 5px 12px rgba(28,26,23,.12);background:#fff9eb}
.action.danger{border-left-color:var(--seal)}
.action.lethal{border-left-color:var(--seal-deep);background:rgba(248,235,232,.86)}
.action.locked{opacity:.42;cursor:not-allowed;filter:grayscale(.3)}
.action-title{font-size:12.5px;font-weight:700;letter-spacing:1px}
.action-tag{align-self:center;padding:1px 5px;border:1px solid var(--line);color:var(--ink-fade);font-size:8px;white-space:nowrap;border-radius:2px}
.action-tag.seal{border-color:var(--seal);color:var(--seal)}
.action-tag:empty{display:none}
.action-cost{grid-column:1/-1;color:var(--ink-fade);font-size:10.5px;line-height:1.45}
.action.danger .action-cost,.action.lethal .action-cost{color:var(--seal-deep)}

/* state explanation drawer */
.state-drawer{position:absolute;inset:0;z-index:45;display:none}.state-drawer.open{display:block}.state-drawer-backdrop{position:absolute;inset:0;background:rgba(18,19,17,.58);backdrop-filter:blur(2px)}.state-drawer>section{position:absolute;left:0;right:0;bottom:0;max-height:84%;overflow-y:auto;padding:18px;background:var(--paper-light);border-top:2px solid var(--gold);box-shadow:0 -20px 55px rgba(0,0,0,.3)}.state-drawer header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}.state-drawer header small{color:var(--ink-fade);font-size:9px;letter-spacing:2px}.state-drawer h2{font-size:20px;letter-spacing:4px}.state-drawer header button{border:0;background:transparent;color:var(--seal);font-size:11px}.state-guide-card{padding:12px 0;border-top:1px solid var(--line)}.state-guide-card:first-child{border-top:0}.state-guide-card h3{display:flex;justify-content:space-between;font-size:13px;color:var(--seal-deep)}.state-guide-card h3 span{font:11px var(--font-mono);color:var(--ink)}.state-guide-card p{margin:6px 0 0;font-size:11px;line-height:1.65;color:var(--ink-soft)}.state-guide-card ul{margin:6px 0 0;padding-left:18px;font-size:10px;line-height:1.65;color:var(--ink-fade)}

/* ═══ MUD EXPLORATION SCREEN (legacy transition screen) ═══ */
#screen-mud{background:var(--paper);min-height:100dvh}
@media(min-width:520px){#screen-mud{min-height:0}}
.mud-head{flex:0 0 auto;padding:13px 16px 11px;color:#eadfc8;background:var(--night);border-bottom:1px solid var(--gold)}
.mud-head-row{display:flex;align-items:flex-end;justify-content:space-between}.mud-head small{display:block;color:#9f9584;font-size:9px;letter-spacing:3px}.mud-head h2{font-size:19px;letter-spacing:4px;margin-top:2px}.mud-pressure{font-size:10px;color:var(--gold-bright);letter-spacing:2px}
.mud-vitals{display:grid;grid-template-columns:repeat(4,1fr);flex:0 0 auto;background:var(--paper-card);border-bottom:1px solid var(--line)}
.mud-vitals span{text-align:center;padding:8px 3px;border-right:1px solid var(--line);font-size:9px;color:var(--ink-fade);letter-spacing:1px}.mud-vitals span:last-child{border:0}.mud-vitals b{display:block;color:var(--ink);font:11px/1.4 var(--font-mono);margin-top:2px}
.mud-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;padding:14px;background:linear-gradient(rgba(236,227,210,.95),rgba(236,227,210,.98)),url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='m'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.05' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23m)' opacity='.2'/%3E%3C/svg%3E")}
.mud-place,.mud-sheet,.mud-combat{padding:15px;background:rgba(248,242,229,.72);border:1px solid var(--line);border-left:3px solid var(--jade)}
.mud-kicker{font-size:10px;letter-spacing:3px;color:var(--seal-deep);margin-bottom:8px}.mud-place p,.mud-sheet p,.mud-combat p{font-size:13px;line-height:1.8;color:var(--ink-soft)}.mud-presence{margin-top:10px;padding-top:9px;border-top:1px dashed var(--line);font-size:10px;color:var(--jade)}
.mud-logbook{margin-top:12px}.mud-log{position:relative;margin:0;padding:7px 8px 7px 19px;border-bottom:1px solid rgba(196,181,148,.42);font-size:12px;line-height:1.65;color:var(--ink-soft)}.mud-log::before{content:'›';position:absolute;left:6px;color:var(--gold)}.mud-log.growth,.mud-record.growth{color:var(--jade)}.mud-log.warning,.mud-log.danger,.mud-record.danger{color:var(--seal-deep)}.mud-log.discovery,.mud-log.victory{color:#7b5e18}.mud-log.dialogue{color:#405b69}
.mud-action-panel{flex:0 0 auto;padding:9px 10px;background:var(--paper-card);border-top:1px solid var(--gold)}.mud-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;max-height:190px;overflow-y:auto}.mud-action{min-height:42px;padding:7px 8px;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:3px;background:var(--paper-light);color:var(--ink);font-size:11px;text-align:left;cursor:pointer}.mud-action.danger{border-left-color:var(--seal)}.mud-action.tech{border-left-color:var(--jade);color:var(--jade)}
.mud-command-form{display:flex;gap:6px;margin-top:8px}.mud-command-form input{min-width:0;flex:1;border:1px solid var(--line);background:#fffaf0;color:var(--ink);padding:8px 10px;font:11px var(--font-mono);outline:none}.mud-command-form input:focus{border-color:var(--jade);box-shadow:0 0 0 2px rgba(74,108,93,.12)}.mud-command-form button{border:0;background:var(--ink);color:var(--gold-bright);padding:0 14px;font-size:11px}
.mud-nav{display:grid;grid-template-columns:repeat(6,1fr);flex:0 0 auto;background:var(--ink);border-top:1px solid var(--gold);padding-bottom:env(safe-area-inset-bottom,0)}.mud-nav button{border:0;background:transparent;color:#aca18e;padding:9px 2px 8px;font:9px var(--font-serif);cursor:pointer}.mud-nav button.active{color:var(--gold-bright);background:rgba(203,166,91,.08)}
.mud-sheet h3{margin:2px 0 9px;color:var(--seal-deep);font-size:13px;letter-spacing:2px}.mud-sheet h3:not(:first-child){margin-top:18px}.mud-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}.mud-stat-grid span{padding:7px 4px;text-align:center;background:var(--paper-2);font-size:9px;color:var(--ink-fade)}.mud-stat-grid b{display:block;color:var(--ink);font:12px var(--font-mono);margin-top:3px}.mud-meter{height:7px;background:#d5cab3;overflow:hidden;margin:7px 0}.mud-meter i{display:block;height:100%;background:linear-gradient(90deg,var(--jade),var(--gold));transition:width .25s}.mud-list-row{padding:10px 0;border-bottom:1px solid var(--line)}.mud-list-row b{display:block;font-size:12px}.mud-list-row span{display:block;margin-top:3px;font-size:10px;line-height:1.55;color:var(--ink-fade)}.mud-record{padding:7px 0;border-bottom:1px solid var(--line);font-size:11px;line-height:1.6}
.combat-bars label{display:grid;grid-template-columns:62px 1fr 48px;gap:7px;align-items:center;margin:8px 0;font-size:9px;color:var(--ink-fade)}.combat-bars i{height:6px;background:#d8cdb7;overflow:hidden}.combat-bars b{display:block;height:100%;background:var(--seal)}.combat-bars label:nth-child(2) b{background:var(--gold)}.enemy-intent{margin:12px 0;padding:9px 11px;background:rgba(158,43,37,.08);border:1px solid rgba(158,43,37,.24);color:var(--seal-deep);font-size:11px;letter-spacing:1px}

/* ═══ ENDING ═══ */
.ending-card{padding:28px 18px;text-align:center}

/* ═══ HISTORY SCREEN ═══ */
#screen-history{background:var(--paper);padding:32px 18px;overflow-y:auto}
#screen-history h2{text-align:center;letter-spacing:6px;margin-bottom:24px}
.history-card{background:var(--paper-card);border-radius:6px;padding:14px 16px;border-left:3px solid var(--gold);margin-bottom:10px;cursor:pointer;transition:transform .1s}
.history-card:active{transform:scale(.98)}
.history-card .hc-title{font-weight:700;letter-spacing:1px;font-size:14px}
.history-card .hc-meta{font-size:11px;color:var(--ink-fade);margin-top:3px}
.history-card .hc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:9px;padding:1px 6px;border-radius:3px;background:var(--paper-2);color:var(--ink-soft);letter-spacing:1px}
.tag.green{background:#d8e6df;color:var(--jade)}
.tag.red{background:#f2d6d4;color:var(--seal)}
.tag.gold{background:#f0e8d0;color:var(--gold)}
.history-detail{background:var(--paper);margin-top:10px;padding:12px;border-radius:4px;border:1px solid var(--line);display:none;font-size:12px;line-height:1.8}
.history-detail td{padding:2px 8px 2px 0;vertical-align:top}
.history-detail td:first-child{color:var(--ink-fade);white-space:nowrap}

/* ═══ BUTTONS ═══ */
.btn{font-family:var(--font-serif);font-size:14px;padding:10px 20px;border-radius:4px;cursor:pointer;border:none;text-align:center;letter-spacing:2px;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--ink);color:var(--gold-bright)}
.btn-secondary{background:var(--paper-card);color:var(--ink);border:1px solid var(--line)}
.btn-danger{background:var(--seal);color:#f5e6d0}
.btn-small{font-size:11px;padding:6px 14px;letter-spacing:1px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:20px}
.empty-state{text-align:center;padding:64px 0;color:var(--ink-soft);font-size:14px;letter-spacing:2px;line-height:2}

/* ═══ TOAST ═══ */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--gold-bright);padding:10px 24px;border-radius:20px;font-size:12px;letter-spacing:1px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ═══ INTRO OVERLAY ═══ */
.intro-overlay{position:absolute;inset:0;background:rgba(23,24,23,.94);z-index:20;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;padding:40px 24px;text-align:center;color:#e7dcc6;overflow-y:auto;animation:fadeIn .6s ease}
.intro-overlay.hide{opacity:0;pointer-events:none;transition:opacity .4s}
.intro-overlay h2{font-size:30px;letter-spacing:10px;margin-bottom:6px}
.intro-overlay .intro-sub{color:var(--gold-bright);font-size:13px;letter-spacing:5px;margin-bottom:24px}
.intro-overlay .intro-text{font-size:14px;line-height:2.1;max-width:360px;text-align:justify;color:#c4b594}
.intro-overlay .intro-text p{margin:0 0 14px}
.intro-overlay .intro-text .speech{border-left-color:rgba(203,166,91,.5);color:#d4c8b2;background:rgba(74,108,93,.08);text-align:left;margin:14px 0}
.intro-overlay .intro-text em{color:#eadfc8;font-style:normal}
.intro-overlay .btn{margin-top:20px;margin-bottom:32px}
.intro-controls{display:flex;flex-direction:column;align-items:center;gap:2px}
.intro-reveal{border:0;background:transparent;color:var(--gold-bright);font:11px/1.5 var(--font-serif);letter-spacing:2px;padding:8px 16px;cursor:pointer}
.intro-overlay .btn:disabled{opacity:.35;cursor:default}
@media(prefers-reduced-motion:reduce){.reveal-unit{transition:none}.intro-overlay{animation:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>

<script>
/* ═══════════════ RUNTIME ENGINE ═══════════════ */
class Runtime{
  constructor(b){
    this.b=b;this.bundle=b;this.events=Object.fromEntries(b.events.map(e=>[e.id,e]));
    this.endings=[...b.endings].sort((a,b)=>b.priority-a.priority);
    this.defs=Object.fromEntries(b.itemDefinitions.map(d=>[d.id,d]));
    const i=b.initialState;
    this.state={
      abilities:{...i.abilities},resources:{...i.resources},
      injury:i.injury,heat:i.heat,life:i.life,freedom:i.freedom,
      flags:new Set(i.flags),conduct:new Set(i.conduct),knowledge:new Set(i.knowledge),
      insights:{...(i.insights||{})},
      relationships:Object.fromEntries(i.relationships.map(r=>[r.characterId,{attitude:r.attitude,tags:new Set(r.tags)}])),
      fates:Object.fromEntries(b.characters.map(c=>[c.id,c.defaultFate])),
      items:Object.fromEntries(b.itemInstances.map(it=>[it.id,{...it}])),
      techniques:new Set,scheduled:new Set()
    };
    this.current=b.scenario.entryEventId;this.ending=null;this.log=[];this.player=i.playerCharacterId;
  }
  _get(p){return p.split('.').reduce((o,k)=>o[k],this.state)}
  _cmp(a,op,b){return{eq:a===b,neq:a!==b,gte:a>=b,lte:a<=b,gt:a>b,lt:a<b}[op]}
  check(c){
    switch(c.op){
      case'always':return true;case'all':return c.conditions.every(x=>this.check(x));
      case'any':return c.conditions.some(x=>this.check(x));case'not':return!this.check(c.condition);
      case'compare':return this._cmp(this._get(c.path),c.cmp,c.value);
      case'hasFlag':return this.state.flags.has(c.flag);
      case'hasConduct':return this.state.conduct.has(c.conduct);
      case'hasItem':{const it=this.state.items[c.itemInstanceId];return it&&it.quantity>0&&(!c.states||c.states.includes(it.state))&&(!c.holderId||it.holderId===c.holderId)&&(c.equipped==null||it.equipped===c.equipped);}
      case'relationship':{const rel=this.state.relationships[c.characterId]||{attitude:0,tags:new Set};let ok=true;if(c.attitude){const[op,v]=Object.entries(c.attitude)[0];ok=this._cmp(rel.attitude,op,v)}return ok&&(!c.tag||rel.tags.has(c.tag));}
      case'techniqueKnown':return this.state.techniques.has(c.techniqueId);
      case'knows':return this.state.knowledge.has(c.claimId);
      case'environmentHas':return(this.events[this.current]?.environmentTags||[]).includes(c.tag);
      case'characterFate':return this.state.fates[c.characterId]===c.fate;
    }return false;
  }
  effect(e){
    const op=e.op;
    if(op==='spendResource')this.state.resources[e.resource]-=e.amount;
    else if(op==='changeResource'){this.state.resources[e.resource]+=e.delta;if(e.min!=null)this.state.resources[e.resource]=Math.max(e.min,this.state.resources[e.resource]);if(e.max!=null)this.state.resources[e.resource]=Math.min(e.max,this.state.resources[e.resource]);}
    else if(op==='setResource')this.state.resources[e.resource]=e.value;
    else if(op==='changeInjury'){this.state.injury+=e.delta;this.state.injury=Math.max(e.minimum??0,Math.min(e.maximum??4,this.state.injury));}
    else if(op==='setInjury')this.state.injury=e.value;
    else if(op==='setHeat')this.state.heat=e.value;
    else if(op==='setLife')this.state.life=e.value;
    else if(op==='setFreedom')this.state.freedom=e.value;
    else if(op==='addFlag')this.state.flags.add(e.flag);
    else if(op==='removeFlag')this.state.flags.delete(e.flag);
    else if(op==='addConduct')this.state.conduct.add(e.conduct);
    else if(op==='removeConduct')this.state.conduct.delete(e.conduct);
    else if(op==='changeRelationship'){const rel=this.state.relationships[e.characterId]=this.state.relationships[e.characterId]||{attitude:0,tags:new Set};rel.attitude+=e.delta;rel.attitude=Math.max(e.min??-2,Math.min(e.max??2,rel.attitude));}
    else if(op==='setRelationship'){(this.state.relationships[e.characterId]=this.state.relationships[e.characterId]||{attitude:0,tags:new Set}).attitude=e.value;}
    else if(op==='addRelationshipTag')(this.state.relationships[e.characterId]=this.state.relationships[e.characterId]||{attitude:0,tags:new Set}).tags.add(e.tag);
    else if(op==='removeRelationshipTag')this.state.relationships[e.characterId]?.tags.delete(e.tag);
    else if(op==='setCharacterFate')this.state.fates[e.characterId]=e.fate;
    else if(op==='transferItem')this.state.items[e.itemInstanceId].holderId=e.holderId;
    else if(op==='setItemState')this.state.items[e.itemInstanceId].state=e.state;
    else if(op==='equipItem')this.state.items[e.itemInstanceId].equipped=true;
    else if(op==='unequipItem')this.state.items[e.itemInstanceId].equipped=false;
    else if(op==='consumeItem')this.state.items[e.itemInstanceId].quantity-=e.amount;
    else if(op==='confiscateVisibleItems'){for(const it of Object.values(this.state.items)){const d=this.defs[it.definitionId];if(it.holderId===this.player&&d?.tags?.includes('item.visible')&&!['state.lost','state.destroyed','state.used'].includes(it.state)){it.holderId=e.holderId;it.state='state.confiscated';it.equipped=false;}}}
    else if(op==='loseItemsByState'){for(const it of Object.values(this.state.items))if(it.state===e.state){it.state='state.lost';it.equipped=false}}
    else if(op==='learnTechnique')this.state.techniques.add(e.techniqueId);
    else if(op==='addInsight')this.state.insights[e.route]=(this.state.insights[e.route]||0)+e.amount;
    else if(op==='addKnowledge')this.state.knowledge.add(e.claimId);
  }
  normalize(){
    const r=this.state.resources;
    for(const[k,hi]of[['breath',4],['time',3],['favor',2]])r[k]=Math.max(0,Math.min(hi,r[k]));
    this.state.injury=Math.max(0,Math.min(4,this.state.injury));this.state.heat=Math.max(0,Math.min(3,this.state.heat));
    if(this.state.injury===4)this.state.life='dead';
    if(this.state.freedom==='captured'||this.state.freedom==='imprisoned')r.time=0;
    if(this.state.flags.has('route.guard')&&this.state.flags.has('route.roam'))throw new Error('routes');
    if(this.state.flags.has('manual.carried')&&this.state.flags.has('manual.entrusted'))throw new Error('manual');
  }
  choose(cid){
    const ev=this.events[this.current];const ch=ev?.choices.find(c=>c.id===cid);
    if(!ch)throw new Error(cid+' missing');if(!this.check(ch.availability))throw new Error('locked');
    for(const cost of(ch.costs||[]))this.effect(cost);
    const res=(ch.resolutions||[]).find(r=>r.default||(r.when&&this.check(r.when)));
    if(!res)throw new Error('no res');for(const ef of(res.effects||[]))this.effect(ef);this.normalize();
    this.log.push(cid);const d=res.next;
    if(d.type==='event')this.current=d.eventId;else if(d.type==='resolveEnding')this.ending=this.resolveEnding();else this.ending='end';
    return res.resultTextKey||null;
  }
  resolveEnding(){for(const e of this.endings)if(this.check(e.when)&&(!e.excludeWhen||!this.check(e.excludeWhen)))return e.id;throw new Error('no ending');}
  clone(){
    const c=new Runtime(this.b);c.state=structuredClone(this.state);
    c.state.flags=new Set(c.state.flags);c.state.conduct=new Set(c.state.conduct);c.state.knowledge=new Set(c.state.knowledge);
    c.state.techniques=new Set(c.state.techniques);c.state.scheduled=new Set(c.state.scheduled);
    for(const rel of Object.values(c.state.relationships))if(rel.tags)rel.tags=new Set(rel.tags);
    c.current=this.current;c.ending=this.ending;c.log=[...this.log];return c;
  }
}

/* ═══════════════ APP STATE ═══════════════ */
let currentCharacter=null,runtime=null,activeBundle=null;
const bundles={};
const INJ=['无伤','轻伤','重伤','濒危','死亡'];
const HEAT=['平静','起疑','暴露','缉拿'];
const FREE={free:'自由',captured:'落网',imprisoned:'收押',escaped:'脱逃',coerced:'被迫效力'};
const RISK_TAG={none:'',costly:'有代价',high:'⚠ 高风险',lethal:'⚔ 致命'};
const STAGES=['stage.changan.departure','stage.changan.search','stage.changan.escort','stage.changan.truth','stage.changan.equipment','stage.changan.growth','stage.changan.commitment','stage.changan.pursuit','stage.changan.confrontation','stage.changan.gate','stage.changan.final','stage.changan.capture','stage.changan.aftermath'];
const LOC_NAMES={
  'location.changan.wang_yun_outer_alley':'王允府外巷','location.changan.west_market_warehouse':'西市废仓','location.changan.old_residence':'王允府旧宅','location.changan.west_market_rooftop':'西市屋脊','location.changan.military_family_lane':'军属里巷','location.changan.military_family_backyard':'军属里巷后院','location.changan.ruined_temple':'废寺偏殿','location.changan.temple_gate':'废寺山门','location.changan.lane_exit':'军属里巷出口','location.changan.west_gate':'长安西门','location.changan.gate_inner':'城门内侧','location.changan.temporary_cell':'临时牢狱','location.changan.aftermath':'长安余烬','location.changan.west_market_ruins':'西市废墟','location.changan.bingzhou_camp':'并州军营','location.changan.backyard':'军属后院','location.changan.near_camp_path':'军营小路','location.changan.gate_hill':'城门外小丘'
};

/* ═══════════════ PROGRESSIVE TEXT REVEAL ═══════════════ */
let activeReveal=null;
const HISTORICAL_ENTITIES=[
  ['李傕','person'],['郭汜','person'],['贾诩','person'],['王允','person'],['吕布','person'],['董卓','person'],
  ['长安','place'],['王允府','history'],['并州军','history'],['凉州军','history'],['董卓旧部','history']
];
function entityTerms(){
  const terms=[...HISTORICAL_ENTITIES];const texts=runtime?.bundle?.texts||{};
  for(const[key,value]of Object.entries(texts)){
    if(!value||value.length>18)continue;
    if(key.startsWith('character.')&&key.endsWith('.name'))terms.push([value,'person']);
    else if(key.startsWith('item.')&&key.endsWith('.name'))terms.push([value,'item']);
    else if(key.startsWith('location.')&&key.endsWith('.name'))terms.push([value,'place']);
    else if(key.startsWith('technique.')&&key.endsWith('.name'))terms.push([value,'technique']);
  }
  const unique=new Map();for(const[term,type]of terms)if(term&&!unique.has(term))unique.set(term,type);
  return [...unique].sort((a,b)=>b[0].length-a[0].length);
}
function highlightEntities(root){
  const terms=entityTerms();if(!terms.length)return;
  const lookup=new Map(terms),escaped=terms.map(([term])=>term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  const regex=new RegExp(`(${escaped.join('|')})`,'g');
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);const nodes=[];
  while(walker.nextNode())if(!walker.currentNode.parentElement.closest('.entity,small'))nodes.push(walker.currentNode);
  for(const node of nodes){
    const parts=node.nodeValue.split(regex);if(parts.length===1)continue;
    const frag=document.createDocumentFragment();for(const part of parts){
      const type=lookup.get(part);if(type){const mark=document.createElement('span');mark.className=`entity entity-${type}`;mark.textContent=part;frag.appendChild(mark)}else frag.appendChild(document.createTextNode(part));
    }node.replaceWith(frag);
  }
}
function sentenceUnits(text){
  return text.match(/[^。！？；…]+(?:[。！？；…]+|$)/g)?.filter(Boolean)||[text];
}
function revealText(container,onComplete){
  const units=[];
  for(const block of container.querySelectorAll('p,.speech')){
    const speaker=block.querySelector(':scope > small');
    const raw=[...block.childNodes].filter(node=>node!==speaker).map(node=>node.textContent).join('').trim();
    const speakerCopy=speaker?.cloneNode(true);block.replaceChildren();if(speakerCopy)block.appendChild(speakerCopy);
    for(const sentence of sentenceUnits(raw)){
      const span=document.createElement('span');span.className='reveal-unit';span.textContent=sentence;block.appendChild(span);highlightEntities(span);units.push(span);
    }
  }
  let index=0,timer=null,finished=false;
  const complete=()=>{if(finished)return;finished=true;clearTimeout(timer);container.classList.add('reveal-complete');units.forEach(x=>x.classList.add('is-shown'));onComplete?.()};
  const step=()=>{
    if(finished)return;if(index>=units.length){complete();return}
    const unit=units[index++];unit.classList.add('is-shown');
    const delay=Math.min(360,150+unit.textContent.length*4);timer=setTimeout(step,delay);
  };
  const controller={finish:complete,cancel:()=>{finished=true;clearTimeout(timer)}};
  if(matchMedia('(prefers-reduced-motion: reduce)').matches||!units.length)complete();else timer=setTimeout(step,90);
  return controller;
}
function beginSceneReveal(story){
  activeReveal?.cancel();
  const panel=document.getElementById('decision-panel'),prompt=document.getElementById('decision-prompt'),skip=document.getElementById('reveal-skip');
  panel.classList.add('is-revealing');prompt.textContent='墨迹渐显 · 局势未定';
  const done=()=>{panel.classList.remove('is-revealing');prompt.textContent='此刻，你如何选择';activeReveal=null};
  const controller=revealText(story,done);activeReveal=panel.classList.contains('is-revealing')?controller:null;skip.onclick=()=>activeReveal?.finish();
}

function renderNarrative(text){
  if(!text)return'';
  // Split on double newlines for paragraphs
  const paras=text.split(/\n\n|\n(?=[「""'『])/);
  return paras.map((p,i)=>{
    p=p.trim();if(!p)return'';
    // Dialogue: starts with speaker marker or quotes
    if(/^[「""'『【]/.test(p)||/^[^，。！？\n]{1,6}[：:]/.test(p)){
      const match=p.match(/^([^：:]{1,6})[：:](.*)/);
      if(match){
        return`<div class="speech"><small>${match[1]}</small>${match[2]}</div>`;
      }
      return`<div class="speech">${p}</div>`;
    }
    // Opening paragraph with drop cap
    const cls=i===0?' opening':'';
    return`<p class="${cls}">${p}</p>`;
  }).join('');
}

  const maxIns=Math.max(guardIns,roamIns,breakerIns,protectorIns);
  if((s.flags.has('route.guard')||s.flags.has('route.roam')||s.flags.has('route.breaker')||s.flags.has('route.protector'))&&maxIns>0){
    story.insertAdjacentHTML('afterend',`<div class="insight"><div class="insight-text"><strong>${techs||'武学参悟中'}</strong><span>${maxIns>=2?'已成招 · 可在终局使用':`领悟 ${maxIns}/2 · 再经一战可成招`}</span></div></div>`);
  }else if(maxIns>0){
    story.insertAdjacentHTML('afterend',`<div class="insight"><div class="insight-text"><strong>武学领悟</strong><span>${guardIns>0?'守剑倾向 · ':''}${roamIns>0?'游剑倾向 · ':''}${breakerIns>0?'破阵倾向 · ':''}${protectorIns>0?'护军倾向 · ':''}待定路</span></div></div>`);
  }

  // Choices
  const actionsDiv=document.getElementById('actions');actionsDiv.innerHTML='';
  for(const ch of ev.choices){
    const avail=runtime.check(ch.availability);const txt=runtime.bundle.texts;
    const btn=document.createElement('button');
    const riskCls=ch.risk==='lethal'?'lethal':ch.risk==='high'?'danger':'';
    btn.type='button';btn.className=`action${!avail?' locked':''} ${riskCls}`;
    btn.dataset.choiceId=ch.id;btn.setAttribute('aria-disabled',String(!avail));
    btn.innerHTML=`<span class="action-title">${txt[ch.labelKey]||ch.id}</span><span class="action-tag${riskCls?' seal':''}">${RISK_TAG[ch.risk]||''}</span><span class="action-cost">${avail?(txt[ch.intentKey]||''):'尚未满足行动条件'}</span>`;
    if(avail)btn.onclick=()=>onChoice(ch.id);else{btn.title='尚未满足行动条件'}
    actionsDiv.appendChild(btn);
  }
  if(typeof renderInlineMudActions==='function')renderInlineMudActions();
  const storyCombatActive=typeof mud!=='undefined'&&mud?.storyCombat&&mud.combat;
  autoSave();
  if(storyCombatActive){
    const opening=[...mud.logs].reverse().find(x=>x.type==='combat')?.text||'伏击者重新压上，你必须先处理眼前交锋。';
    appendTimeline('交锋开始',opening,[],'system');
  }else{document.getElementById('scene-scroll').scrollTop=0;beginSceneReveal(story)}
}

function stateSnapshot(){
  const s=runtime.state;return{breath:s.resources.breath,time:s.resources.time,favor:s.resources.favor,injury:s.injury,heat:s.heat,freedom:s.freedom,techniques:new Set(s.techniques)};
}
function stateDeltas(before,after){
  const out=[];const breath=after.breath-before.breath,favor=after.favor-before.favor,time=after.time-before.time;
  if(breath)out.push(`内息 ${breath>0?'+':''}${breath}`);if(favor)out.push(`人情 ${favor>0?'+':''}${favor}`);if(time<0)out.push('城门进度向前推进');
  if(after.injury!==before.injury)out.push(`伤势 → ${INJ[after.injury]}`);
  if(after.heat!==before.heat)out.push(`风声 → ${HEAT[after.heat]}`);
  if(after.freedom!==before.freedom)out.push(`自由 → ${FREE[after.freedom]||after.freedom}`);
  for(const tech of after.techniques)if(!before.techniques.has(tech))out.push(`悟得 ${runtime.bundle.texts[tech+'.name']||tech.split('.').pop()}`);
  return out;
}
function appendTimeline(label,text,deltas=[],type='normal',continueAction=null){
  const area=document.getElementById('timeline-area');area.querySelectorAll('.latest').forEach(x=>x.classList.remove('latest'));
  const entry=document.createElement('article');entry.className=`timeline-entry latest ${type}`;
  entry.innerHTML=`<div class="timeline-label">${label}</div><div class="timeline-body">${renderNarrative(text)}</div>${deltas.length?`<div class="timeline-deltas">${deltas.map(x=>`<span class="state-chip">${x}</span>`).join('')}</div>`:''}${continueAction?'<button type="button" class="btn btn-primary timeline-continue">继续</button>':''}`;
  highlightEntities(entry.querySelector('.timeline-body'));area.appendChild(entry);
  if(continueAction){const button=entry.querySelector('.timeline-continue');button.onclick=continueAction;button.focus()}
  requestAnimationFrame(()=>entry.scrollIntoView({behavior:'smooth',block:'end'}));
  return entry;
}
function showResult(label,text,deltas,onContinue){
  const panel=document.getElementById('decision-panel');panel.classList.add('has-result');document.getElementById('decision-prompt').textContent='行动已经发生';
  appendTimeline(`你选择：${label}`,text,deltas,'system',()=>{panel.classList.remove('has-result');onContinue()});
}
function onChoice(cid){
  const event=runtime.events[runtime.current],choice=event.choices.find(x=>x.id===cid),label=runtime.bundle.texts[choice?.labelKey]||'作出选择',sourceEvent=runtime.current;
  const before=stateSnapshot();let resultKey;
  try{resultKey=runtime.choose(cid)}catch(e){toast('错误: '+e.message);return}
  if(sourceEvent==='event.changan.dujian.d02'&&typeof beginStoryCombat==='function'){
    const nextEvent=runtime.current;runtime.current=sourceEvent;beginStoryCombat(cid,sourceEvent,nextEvent);
  }
  const deltas=stateDeltas(before,stateSnapshot());autoSave();const text=resultKey?runtime.bundle.texts[resultKey]:'';
  if(text)showResult(label,text,deltas,renderGame);else renderGame();
}
function openStateGuide(focus=null){
  if(!runtime)return;const event=runtime.events[runtime.current],stageIdx=STAGES.indexOf(event.stage),gate=gateState(stageIdx),s=runtime.state,skill=typeof mud!=='undefined'&&mud?(mud.proficiency[mud.character==='du_jian'?'short_sword':'saber']||0):0;
  const cards={
    hp:['气血',typeof mud!=='undefined'&&mud?`${mud.hp}/${mud.maxHp}`:'—','战斗中的短期承受能力。气血归零不会直接死亡，但会战败并增加伤势。',['受到攻击会降低','治疗或升级可以恢复','低于三成时应优先防守或撤退']],
    stamina:['体力',typeof mud!=='undefined'&&mud?`${mud.stamina}/${mud.maxStamina}`:'—','移动、训练和普通战斗动作消耗的资源。',['快攻通常消耗2点','格挡可以恢复1点','体力不足时无法完成强行动']],
    breath:['内息',String(s.resources.breath),'施展进阶武学的资源，剧情和战斗共用。',['招式会消耗内息','调息和特殊药物可以恢复','内息不足时仍可使用基础动作']],
    gate:['城门进度',gate.name,gate.effect,[gate.next,'耗时选择、训练和绕路会推进','查看状态和阅读说明不会推进']],
    injury:['伤势',INJ[s.injury],'跨战斗持续的身体损伤，会限制强攻、轻功和终局承受能力。',['气血归零或剧情重创会加重','药物与明确治疗可以缓解','濒危后再次重创可能死亡']],
    heat:['风声',HEAT[s.heat],'外界对你身份和行动的关注程度，不等于已经被捕。',[s.heat>=2?'当前盘查和追兵已经加强':'当前尚未形成公开追捕','公开亮明身份或动武会提高','伪装、绕行和人情可能降低影响']],
    skill:['兵器熟练',`${skill}/100`,'表示本局对短剑或环首刀的掌握，用于解锁新的行动方法。',['有效训练和实战可以提高','同一地点重复训练收益有限','熟练数值不直接跨周目继承']]
  };
  const order=focus&&cards[focus]?[focus,...Object.keys(cards).filter(x=>x!==focus)]:Object.keys(cards);
  document.getElementById('state-guide-content').innerHTML=order.map(key=>{const[name,value,desc,items]=cards[key];return `<article class="state-guide-card" data-state="${key}"><h3>${name}<span>${value}</span></h3><p>${desc}</p><ul>${items.map(x=>`<li>${x}</li>`).join('')}</ul></article>`}).join('');
  const drawer=document.getElementById('state-drawer');drawer.classList.add('open');drawer.setAttribute('aria-hidden','false');
}
function closeStateGuide(){const drawer=document.getElementById('state-drawer');drawer.classList.remove('open');drawer.setAttribute('aria-hidden','true')}
function submitInlineCommand(event){event.preventDefault();const input=document.getElementById('inline-command-input'),value=input.value.trim();input.value='';if(value&&typeof runInlineMudCommand==='function')runInlineMudCommand(value)}

function renderEnding(){
  activeReveal?.cancel();activeReveal=null;document.getElementById('decision-panel').classList.remove('is-revealing');
  const ending=runtime.bundle.endings.find(e=>e.id===runtime.ending);
  const title=ending?runtime.bundle.texts[ending.titleKey]:'旅途终点';
  const summaryKey=ending?selectConditionalText(ending.summaryKey,ending.summaryVariants):null;
  const summary=summaryKey?runtime.bundle.texts[summaryKey]:'';
  const s=runtime.state;
  document.getElementById('st-hp').textContent=s.life==='alive'?'生还':s.life==='dead'?'死亡':'不明';
  document.getElementById('st-stamina').textContent=FREE[s.freedom]||s.freedom;
  document.getElementById('st-breath').textContent=s.resources.breath;
  document.getElementById('st-gate').textContent='余波';
  document.getElementById('mission-card').style.display='none';document.getElementById('timeline-area').innerHTML='';document.getElementById('story-area').innerHTML='';
  document.getElementById('scene-scroll').insertAdjacentHTML('beforeend',`<div class="ending-card"><div class="ending-title">${title}</div><div class="ending-summary">${summary}</div><div class="ending-tags">${[...s.conduct].map(c=>`<span class="tag red">${c}</span>`).join('')}${[...s.techniques].map(t=>`<span class="tag green">${t.split('.').pop()}</span>`).join('')}</div><div class="btn-row"><button class="btn btn-primary" onclick="showScreen('screen-title')">返回标题</button><button class="btn btn-secondary" onclick="showScreen('screen-history')">查看史卷</button></div></div>`);
  highlightEntities(document.querySelector('.ending-summary'));
  document.getElementById('actions').innerHTML='';document.getElementById('decision-panel').style.display='none';
}

/* ═══════════════ HISTORY ═══════════════ */
function renderHistory(){
  const h=JSON.parse(localStorage.getItem('history')||'[]');const c=document.getElementById('history-content');
  if(!h.length){c.innerHTML='<div class="empty-state">尚无通关记录<br>江湖仍在等待你的刀痕</div>';return}
  c.innerHTML=h.map((r,i)=>`<div class="history-card" onclick="toggleDetail(${i})"><div class="hc-title">${r.character==='du_jian'?'杜缄':'任朔'} · ${r.endingTitle}</div><div class="hc-meta">${new Date(r.date).toLocaleDateString('zh-CN')} · ${INJ[r.injury]} · ${FREE[r.freedom]||r.freedom} · ${r.life==='alive'?'生还':r.life==='dead'?'死亡':'不明'}</div><div class="hc-tags">${(r.conduct||[]).map(c=>`<span class="tag red">${c}</span>`).join('')}</div><div class="history-detail" id="detail-${i}"><table>${['结局: '+r.endingTitle,'伤势: '+INJ[r.injury],'风声: '+HEAT[r.heat],'自由: '+(FREE[r.freedom]||r.freedom),'武学: '+(r.techniques||[]).map(t=>t.split('.').pop()).join(' · ')||'无','行止: '+(r.conduct||[]).join(' · ')||'无记录'].map(x=>'<tr><td>'+x.split(':')[0]+'</td><td>'+x.split(':').slice(1).join(':')+'</td></tr>').join('')}</table></div></div>`).join('');
}
function toggleDetail(i){const el=document.getElementById('detail-'+i);el.style.display=el.style.display==='none'?'':'none';}

/* ═══════════════ TESTS ═══════════════ */
async function runTests(){
  const logEl=document.getElementById('test-log');logEl.style.display='block';logEl.innerHTML='<div style="padding:8px">运行中...</div>';
  await loadBundle('du_jian');await loadBundle('ren_shuo');
  const P={du_jian:'choice.changan.dujian.',ren_shuo:'choice.changan.renshuo.'};
  const routes={
    '杜缄·守剑':['d01.accept','d02.guard_xu','d03.stay','d03_treat.use_medicine','d04a.take_leaf','d05.take_all','d06_armor.stretcher','d06_medicine.aluo_treats','d07.guard','d08.confront','d09.guard','d10.aluo_first','d11a.fight','d11b.guard','d11c.break_sword','d12.protect'],
    '杜缄·游剑':['d01.inspect_seal','d02.chase_archer','d03.chase','d04b.save_attacker','d05.give_route','d06_armor.leave','d06_medicine.give_own','d07.roam','d08.draw_sword','d09.roam','d10.give_seal','d11a.fight','d11b.roam','d11_roam_cost.leave_sword','d11c.leave','d12.protect'],
    '杜缄·守令':['d01.accept','d02.show_seal','d03.stay','d03_treat.use_medicine','d04a.refuse_leaf','d05.force_aluo','d06_armor.wear','d06_medicine.leave','d07.skip','d08.obey','d12.leave'],
    '杜缄·收押':['d01.accept','d02.guard_xu','d03.stay','d03_treat.use_medicine','d04a.take_leaf','d05.take_all','d06_armor.stretcher','d06_medicine.aluo_treats','d07.guard','d08.promise','d09.seal','d10.surrender','d11_capture.confess','d12.wall'],
    '杜缄·脱逃':['d01.accept','d02.guard_xu','d03.stay','d03_treat.use_medicine','d04a.take_leaf','d05.take_all','d06_armor.stretcher','d06_medicine.aluo_treats','d07.guard','d08.promise','d09.seal','d10.surrender','d11_capture.escape','d12.protect'],
    '任朔·破阵':['r01.accept','r02.copy_names','r03.show_token','r04.listen','r05.acquiesce','r06_armor.keep_light','r06_medicine.give_old','r07.breaker','r08.with_wei','r09a.fight','r09b.breaker','r09c.leave_chaos','r10.leave'],
    '任朔·护军':['r01.accept','r02.trace_sword','r03.help','r04.listen','r05.stop_quietly','r06_armor.distribute','r06_medicine.give_old','r07.protector','r08.civilians_first','r09a.demand_free','r09b.protector','r09c.break_saber','r10.protect'],
    '任朔·受缚':['r01.accept','r02.copy_names','r03.help','r04.listen','r05.acquiesce','r06_armor.wear_full','r06_medicine.give_old','r07.skip','r08.civilians_first','r09a.fight','r09b.armor_block','r09c.let_go','r10.prison'],
  };
  const exp={};
  for(const[c,k]of Object.entries({du_jian:{守剑:'protect',游剑:'protect',守令:'duty',收押:'prison',脱逃:'protect'},ren_shuo:{破阵:'breakthrough',护军:'protect_ren',受缚:'prison_ren'}})){
    for(const[n,en]of Object.entries(k))exp[c+'·'+n]=en;
  }
  let html='';
  for(const[name,path]of Object.entries(routes)){
    const char=name.startsWith('杜')?'du_jian':'ren_shuo';
    const rt=new Runtime(bundles[char]);
    try{for(const cid of path)rt.choose(P[char]+cid)}catch(e){html+=`<div style="color:var(--seal)">FAIL ${name}: ${e.message}</div>`;continue}
    const ok=rt.ending&&rt.ending.endsWith(exp[name]);
    html+=`<div style="color:${ok?'var(--jade)':'var(--seal)'}">${ok?'PASS':'FAIL'} ${name} → ${exp[name]}</div>`;
  }
  html+='<div>—— 完成 ——</div>';logEl.innerHTML=html;
}

updateContinue();
